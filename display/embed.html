<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>satis&amp;fy – Embed</title>
  <link rel="icon" type="image/svg+xml" href="https://satis-fy.com/favicon.svg">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0d0d0d; color: #f1f5f9; font-family: 'Segoe UI', system-ui, sans-serif; height: 100vh; overflow: hidden; }
    iframe { width: 100vw; height: 100vh; border: none; display: block; }
    #noUrl {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      color: #64748b;
      font-size: 1.2rem;
      text-align: center;
    }
    #noUrl .icon { font-size: 3rem; }
  </style>
</head>
<body>

  <div id="noUrl" style="display:none">
    <div class="icon">🔗</div>
    <div id="noUrlMsg">Keine URL konfiguriert.<br>Im Admin unter <strong>Widgets → Embed-URL</strong> eintragen.</div>
  </div>
  <iframe id="embedFrame" src="" allowfullscreen allow="autoplay; fullscreen" style="display:none"></iframe>

  <script>
    const SLOT = new URLSearchParams(location.search).get('slot') || '1';
    const PREVIEW_MODE = new URLSearchParams(location.search).get('preview') === '1';

    function buildSequence(data) {
      const webOnly = data.pages?.active === 'web';
      const seq = [];
      if (!webOnly) {
        seq.push({ id: 'display', url: 'index.html' });
        if (data.calendar?.icsUrl || data.teams?.enabled) seq.push({ id: 'calendar', url: 'calendar.html' });
      }
      if (data.widgets?.embedUrl && data.widgets?.embedSlot1Active !== false) seq.push({ id: 'embed', url: 'embed.html' });
      (data.widgets?.embedSlots || []).forEach(s => {
        if (s.active && s.url) seq.push({ id: 'embed' + s.id, url: 'embed.html?slot=' + s.id });
      });
      (data.slides || []).forEach(s => {
        if (s.active) seq.push({ id: 'slide' + s.id, url: 'slide.html?id=' + s.id });
      });
      if (seq.length === 0) seq.push({ id: 'display', url: 'index.html' });
      return seq;
    }

    async function loadEmbed() {
      try {
        const res = await fetch('/api/content');
        const data = await res.json();
        const frame   = document.getElementById('embedFrame');
        const noUrl   = document.getElementById('noUrl');
        const noUrlMsg = document.getElementById('noUrlMsg');

        document.body.classList.toggle('display-rotate', !!data.widgets?.rotate90);
        const active = data.pages?.active;
        if (!PREVIEW_MODE) {
          if (active && active !== 'embed' && active !== 'auto' && active !== 'web') {
            location.replace(active === 'calendar' ? 'calendar.html' : 'index.html');
            return;
          }
          if (active === 'auto' || active === 'web') {
            const seq = buildSequence(data);
            if (seq.length > 1) {
              const myId = SLOT === '1' ? 'embed' : 'embed' + SLOT;
              const idx  = seq.findIndex(p => p.id === myId);
              const next = seq[(idx + 1) % seq.length];
              setTimeout(() => location.replace(next.url), (data.pages?.rotationSec || 30) * 1000);
            }
          }
        }

        // URL für diesen Slot ermitteln
        let url;
        if (SLOT === '1') {
          url = data.widgets?.embedUrl;
        } else {
          url = (data.widgets?.embedSlots || []).find(s => s.id === parseInt(SLOT))?.url;
        }

        if (url) {
          if (frame.src !== url) frame.src = url;
          frame.style.display = 'block';
          noUrl.style.display = 'none';
        } else {
          frame.style.display = 'none';
          noUrlMsg.innerHTML = 'Keine URL konfiguriert.<br>Im Admin unter <strong>Widgets → Embed ' + SLOT + '</strong> eintragen.';
          noUrl.style.display = 'flex';
        }
      } catch {
        document.getElementById('embedFrame').style.display = 'none';
        document.getElementById('noUrl').style.display = 'flex';
      }
    }

    loadEmbed();

    function connectSSE() {
      const es = new EventSource('/api/events');
      es.onmessage = (e) => { if (e.data === 'update') loadEmbed(); };
      es.onerror = () => { es.close(); setTimeout(connectSSE, 10000); };
    }
    connectSSE();

    // ── Kiosk-Modus ──────────────────────────────────────────────────────
    (function initKiosk() {
      if (new URLSearchParams(location.search).has('preview')) return;
      function enterFullscreen() {
        if (!document.fullscreenElement)
          document.documentElement.requestFullscreen().catch(() => {});
      }
      document.addEventListener('click', enterFullscreen, { once: true });
      document.addEventListener('keydown', enterFullscreen, { once: true });
      let cursorTimer;
      function resetCursor() {
        document.body.classList.remove('kiosk-hide-cursor');
        clearTimeout(cursorTimer);
        cursorTimer = setTimeout(() => document.body.classList.add('kiosk-hide-cursor'), 3000);
      }
      document.addEventListener('mousemove', resetCursor);
      resetCursor();
    })();
  </script>
</body>
</html>
