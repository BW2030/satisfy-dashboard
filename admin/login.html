<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>satis&amp;fy – Dashboard Login</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23dc2626'/%3E%3Ctext x='16' y='22' font-size='18' text-anchor='middle' fill='white' font-family='sans-serif' font-weight='bold'%3EA%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="../shared/style.css">
  <style>
    .sf-logo {
      height: 36px;
    }
    .sf-logo-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
    }
    .lang-toggle {
      position: fixed;
      top: 16px;
      right: 20px;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      padding: 6px 14px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.2s;
    }
    .lang-toggle:hover { background: var(--border); }
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 24px 0 0;
    }
    .powered-by {
      text-align: center;
      font-size: 0.7rem;
      color: var(--muted);
      margin-top: 12px;
    }
  </style>
</head>
<body class="login-body">

  <!-- Language toggle -->
  <button class="lang-toggle" onclick="I18n.toggle()">EN</button>

  <div class="login-card">
    <!-- satis&fy Logo -->
    <div class="sf-logo-wrap">
      <img
        src="https://satis-fy.com/favicon.svg"
        alt="satis&amp;fy"
        class="sf-logo"
        onerror="this.style.display='none'; document.getElementById('logoFallback').style.display='block'"
      >
      <span id="logoFallback" style="display:none; font-size:1.4rem; font-weight:700; letter-spacing:1px;">satis&amp;fy</span>
    </div>

    <h1 class="login-title">Dashboard</h1>
    <p class="login-subtitle" data-i18n="login.subtitle">Bitte mit Name und PIN anmelden</p>

    <form id="loginForm" autocomplete="off">
      <div class="form-group">
        <label for="nameInput" data-i18n="login.label.name">Name</label>
        <input
          type="text"
          id="nameInput"
          placeholder="admin"
          autocomplete="off"
          required
        >
      </div>

      <div class="form-group">
        <label for="pinInput" data-i18n="login.label.pin">4-stelliger PIN</label>
        <input
          type="password"
          id="pinInput"
          class="pin-input"
          placeholder="••••"
          maxlength="4"
          pattern="[0-9]{4}"
          inputmode="numeric"
          autocomplete="off"
          required
        >
      </div>

      <button type="submit" class="btn btn-primary" id="loginBtn" data-i18n="login.btn">Anmelden</button>
      <div class="error-msg" id="errorMsg"></div>
    </form>

    <hr class="divider">

    <!-- Microsoft Login -->
    <a id="msLoginBtn" href="/auth/microsoft/admin-login"
       style="display:flex;align-items:center;justify-content:center;gap:10px;
              margin-top:16px;padding:12px;border-radius:8px;text-decoration:none;
              background:#fff;border:1px solid #d0d0d0;color:#1a1a1a;font-weight:600;font-size:0.95rem;
              transition:background 0.2s">
      <svg width="20" height="20" viewBox="0 0 21 21" xmlns="http://www.w3.org/2000/svg">
        <rect x="1" y="1" width="9" height="9" fill="#f25022"/>
        <rect x="11" y="1" width="9" height="9" fill="#7fba00"/>
        <rect x="1" y="11" width="9" height="9" fill="#00a4ef"/>
        <rect x="11" y="11" width="9" height="9" fill="#ffb900"/>
      </svg>
      Mit Microsoft anmelden
    </a>
    <div id="msError" style="color:var(--danger);font-size:0.82rem;margin-top:8px;text-align:center"></div>

    <p class="powered-by" data-i18n="login.session.note">Session läuft nach 8 Stunden ab.</p>
  </div>

  <script src="../shared/data.js?v=2"></script>
  <script src="../shared/auth.js?v=2"></script>
  <script src="../shared/i18n.js?v=2"></script>
  <script>
    // Microsoft OAuth Redirect zurück
    const _p = new URLSearchParams(location.search);
    if (_p.get('_t') && _p.get('_n')) {
      Auth.setFromToken(decodeURIComponent(_p.get('_n')), _p.get('_t'));
      window.location.href = 'index.html';
    }
    if (_p.get('ms_error')) {
      const err = _p.get('ms_error');
      document.getElementById('msError').textContent =
        err === 'not_configured' ? '⚠ Teams nicht konfiguriert (Tenant/Client ID fehlt)' : '✗ Microsoft-Login fehlgeschlagen: ' + err;
      history.replaceState({}, '', location.pathname);
    }

    // Redirect if already logged in
    if (Auth.isLoggedIn()) window.location.href = 'index.html';

    // Apply translations on load
    document.addEventListener('DOMContentLoaded', () => I18n.applyToDOM());

    // Only allow digits in PIN field
    document.getElementById('pinInput').addEventListener('input', function () {
      this.value = this.value.replace(/\D/g, '').slice(0, 4);
    });

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn      = document.getElementById('loginBtn');
      const errorMsg = document.getElementById('errorMsg');
      const name     = document.getElementById('nameInput').value.trim();
      const pin      = document.getElementById('pinInput').value;

      if (pin.length !== 4) {
        errorMsg.textContent = I18n.t('login.err.pin.length');
        return;
      }

      btn.disabled = true;
      btn.textContent = I18n.t('login.btn.checking');
      errorMsg.textContent = '';

      const result = await Auth.login(name, pin);

      if (result.ok) {
        window.location.href = 'index.html';
      } else if (result.lockedFor) {
        const mins = Math.ceil(result.lockedFor / 60);
        errorMsg.textContent = I18n.t('login.err.locked', { min: mins });
        btn.disabled = true;
        btn.textContent = I18n.t('login.btn');
      } else {
        const attemptsText = result.attemptsLeft
          ? ' ' + I18n.t('login.err.attempts', { n: result.attemptsLeft })
          : '';
        errorMsg.textContent = I18n.t('login.err.invalid') + attemptsText;
        btn.disabled = false;
        btn.textContent = I18n.t('login.btn');
        document.getElementById('pinInput').value = '';
        document.getElementById('pinInput').focus();
      }
    });
  </script>
</body>
</html>
